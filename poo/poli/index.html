<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRASP · Polymorphism — Patrón de Polimorfismo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />

<style>
:root {
  --primary: #1a3a5c;
  --primary-light: #2563a8;
  --accent: #00b4d8;
  --accent-warm: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #e8f0f8;
  --text: #1e293b;
  --text-muted: #64748b;
  --border: #cbd5e1;
  --code-bg: #0d1b2a;
  --code-text: #e2e8f0;
  --font-title: 'Syne', sans-serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-code: 'JetBrains Mono', monospace;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(26,58,92,0.10);
  --shadow-lg: 0 8px 40px rgba(26,58,92,0.18);
  --transition: 0.28s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }

/* TOP BAR */
.topbar { background: var(--primary); color: #fff; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
.topbar-brand { font-family: var(--font-title); font-size: 1.05rem; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
.grasp-badge { background: var(--accent); color: var(--primary); font-size: .7rem; font-weight: 800; padding: 2px 10px; border-radius: 20px; letter-spacing: 2px; }
.topbar-nav { display: flex; align-items: center; gap: 8px; }
.nav-btn { background: rgba(255,255,255,0.12); border: none; color: #fff; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: .85rem; font-family: var(--font-body); transition: background var(--transition); display: flex; align-items: center; gap: 6px; }
.nav-btn:hover { background: rgba(255,255,255,0.22); }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.slide-counter { font-family: var(--font-title); font-size: .85rem; color: rgba(255,255,255,0.7); min-width: 60px; text-align: center; }

/* PROGRESS */
.progress-bar-wrap { position: fixed; top: 48px; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.1); z-index: 99; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-warm)); transition: width var(--transition); }

/* SLIDES */
.slides-wrapper { margin-top: 51px; min-height: calc(100vh - 51px); }
.slide { display: none; width: 100%; padding: 40px 24px 80px; animation: slideIn 0.4s ease; }
.slide.active { display: flex; flex-direction: column; }
@keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* TYPOGRAPHY */
.slide-label { font-family: var(--font-title); font-size: .72rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.slide-title { font-family: var(--font-title); font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 800; color: var(--primary); line-height: 1.2; margin-bottom: 24px; }
.slide-title .accent { color: var(--accent); }
.lead-text { font-size: 1rem; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }

/* COVER */
.slide-cover { background: linear-gradient(135deg, var(--primary) 0%, #0f2640 60%, #0a1929 100%); justify-content: center; align-items: center; text-align: center; color: #fff; min-height: calc(100vh - 51px); }
.cover-badge { font-family: var(--font-title); font-size: .7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.cover-icon { font-size: 5rem; color: var(--accent); margin-bottom: 24px; text-shadow: 0 0 40px rgba(0,180,216,0.4); }
.cover-title { font-family: var(--font-title); font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 800; color: #fff; letter-spacing: -2px; line-height: 1; margin-bottom: 12px; }
.cover-subtitle { font-size: 1.2rem; color: rgba(255,255,255,0.65); margin-bottom: 32px; }
.cover-note { background: rgba(0,180,216,0.12); border: 1px solid rgba(0,180,216,0.3); color: rgba(255,255,255,0.8); padding: 10px 24px; border-radius: 30px; font-size: .9rem; display: inline-block; }

/* CONCEPT BOXES */
.concept-box { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.concept-question, .concept-answer { padding: 20px; border-radius: var(--radius); line-height: 1.6; }
.concept-question { background: #fff3cd; border-left: 4px solid var(--accent-warm); }
.concept-question i { color: var(--accent-warm); margin-right: 8px; }
.concept-answer { background: #d1fae5; border-left: 4px solid var(--success); }
.concept-answer i { color: var(--success); margin-right: 8px; }
.concept-answer .highlight { color: var(--primary-light); font-weight: 700; }
.intuition-box { background: var(--primary); color: rgba(255,255,255,0.9); border-radius: var(--radius); padding: 16px 24px; text-align: center; font-size: 1.05rem; }
.intuition-box i { color: var(--accent); margin-right: 10px; }

/* WARNING BOX */
.warning-box { background: #fff3cd; border: 1px solid #fbbf24; border-left: 4px solid #f59e0b; border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px; font-size: .92rem; }
.warning-box i { color: #d97706; margin-top: 2px; flex-shrink: 0; }

/* CODE */
.code-tabs { background: var(--code-bg); border-radius: var(--radius); overflow: hidden; }
.code-nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 8px 8px 0; gap: 4px; }
.code-nav .nav-link { color: rgba(255,255,255,0.5); font-family: var(--font-code); font-size: .82rem; padding: 6px 14px; border-radius: 6px 6px 0 0; border: 1px solid transparent; }
.code-nav .nav-link.active { background: rgba(0,180,216,0.15); color: var(--accent); border-color: rgba(0,180,216,0.3); }
.code-tab-content { padding: 0; }
.code-tab-content .tab-pane pre { margin: 0; padding: 20px; overflow-x: auto; }
pre, code { font-family: var(--font-code); font-size: .83rem; line-height: 1.7; }
pre { background: var(--code-bg); color: var(--code-text); border-radius: var(--radius); padding: 20px; overflow-x: auto; margin: 0; }
.kw  { color: #569cd6; }
.cl  { color: #4ec9b0; }
.iface { color: #c586c0; }
.mt  { color: #dcdcaa; }
.st  { color: #ce9178; }
.cm  { color: #6a9955; font-style: italic; }
.en  { color: #b5cea8; }
.diff-add { color: #b5cea8; display: block; }
.diff-rem { color: #f48771; display: block; }
.diff-add::before { content: '+ '; color: var(--success); }
.diff-rem::before { content: '- '; color: var(--danger); }

/* NOTE */
.note-box { background: rgba(37,99,168,0.08); border: 1px solid rgba(37,99,168,0.2); border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: .88rem; color: var(--text-muted); display: flex; align-items: flex-start; gap: 10px; }
.note-box i { color: var(--primary-light); margin-top: 2px; flex-shrink: 0; }

/* PROBLEM / ANALYSIS */
.problem-box, .analysis-box { background: var(--surface); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); height: 100%; }
.problem-box h5, .analysis-box h5 { font-family: var(--font-title); font-size: 1rem; color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.analysis-step { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; font-size: .9rem; }
.step-num { background: var(--primary); color: #fff; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; flex-shrink: 0; }
.highlight-step { background: #d1fae5 !important; border-left: 3px solid var(--success); }
.highlight-step .step-num { background: var(--success); }
.bad-step { background: #fee2e2 !important; border-left: 3px solid var(--danger); }
.bad-step .step-num { background: var(--danger); }

/* UML DIAGRAM */
.uml-diagram { background: var(--code-bg); border-radius: var(--radius); padding: 24px; display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; }
.uml-box { border-radius: 8px; text-align: center; font-family: var(--font-code); font-size: .82rem; min-width: 130px; }
.uml-interface { background: rgba(197,134,192,0.15); border: 2px solid #c586c0; }
.uml-class    { background: rgba(78,201,176,0.12); border: 2px solid #4ec9b0; }
.uml-other    { background: rgba(0,180,216,0.10); border: 2px solid var(--accent); }
.uml-box-header { padding: 8px 14px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); }
.uml-box-header small { display: block; font-size: .65rem; opacity: .7; font-style: italic; }
.uml-box-body { padding: 8px 14px; font-size: .78rem; color: rgba(255,255,255,0.7); line-height: 1.6; }
.uml-connector { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 0 10px; color: rgba(255,255,255,0.4); font-size: .7rem; }
.uml-connector-line { width: 2px; height: 40px; background: rgba(255,255,255,0.25); }
.uml-connector-h { height: 2px; width: 40px; background: rgba(255,255,255,0.25); }
.uml-connector-diamond { width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.4); transform: rotate(45deg); }
.uml-connector-tri { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 12px solid rgba(197,134,192,0.6); }
.uml-col { display: flex; flex-direction: column; align-items: center; gap: 0; }

/* COMPARE */
.compare-box { border-radius: var(--radius); overflow: hidden; border: 2px solid var(--border); }
.compare-header { padding: 10px 16px; font-family: var(--font-title); font-size: .85rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.compare-bad  .compare-header { background: #fee2e2; color: #b91c1c; border-bottom: 1px solid #fca5a5; }
.compare-good .compare-header { background: #d1fae5; color: #065f46; border-bottom: 1px solid #6ee7b7; }
.compare-bad  { border-color: #fca5a5; }
.compare-good { border-color: #6ee7b7; }

/* POLY FLOW */
.poly-flow { display: flex; align-items: stretch; justify-content: center; gap: 0; background: var(--code-bg); border-radius: var(--radius); padding: 20px; flex-wrap: wrap; }
.poly-node { background: rgba(0,180,216,0.12); border: 1px solid rgba(0,180,216,0.3); border-radius: var(--radius); padding: 14px 18px; text-align: center; font-size: .82rem; color: var(--code-text); font-family: var(--font-code); min-width: 130px; }
.poly-node.iface-node { background: rgba(197,134,192,0.15); border-color: #c586c0; }
.poly-node.impl-node  { background: rgba(78,201,176,0.12);  border-color: #4ec9b0; }
.poly-node i { font-size: 1.2rem; display: block; margin-bottom: 4px; }
.poly-node i.iface-icon { color: #c586c0; }
.poly-node i.impl-icon  { color: #4ec9b0; }
.poly-node i.prog-icon  { color: var(--accent); }
.poly-arrow { display: flex; align-items: center; justify-content: center; padding: 0 10px; color: rgba(255,255,255,0.35); font-size: .75rem; flex-direction: column; gap: 2px; }
.poly-arrow i { font-size: .95rem; }
.poly-arrow-v { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: rgba(255,255,255,0.35); font-size: .75rem; padding: 4px 0; }

/* BENEFITS */
.benefit-card { background: var(--surface); border-radius: var(--radius); padding: 24px 20px; text-align: center; box-shadow: var(--shadow); border-top: 3px solid var(--accent); height: 100%; transition: transform var(--transition), box-shadow var(--transition); }
.benefit-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.benefit-icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 1.3rem; color: #fff; }
.benefit-card h5 { font-family: var(--font-title); color: var(--primary); margin-bottom: 10px; }
.benefit-card p { color: var(--text-muted); font-size: .9rem; line-height: 1.6; }
.summary-banner { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; padding: 18px 24px; border-radius: var(--radius); text-align: center; font-size: 1rem; }
.summary-banner i { color: var(--accent-warm); margin-right: 10px; }

/* EXERCISES */
.exercises-wrapper { padding: 60px 24px 80px; margin-top: 51px; display: none; }
.exercises-wrapper.active { display: block; }
.ex-header { text-align: center; margin-bottom: 40px; }
.ex-header h2 { font-family: var(--font-title); font-size: 2.2rem; color: var(--primary); font-weight: 800; }
.exercise-card { background: var(--surface); border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 32px; overflow: hidden; border: 1px solid var(--border); }
.exercise-card-header { background: var(--primary); color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 14px; }
.ex-number { width: 36px; height: 36px; background: var(--accent); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-weight: 800; font-size: 1rem; flex-shrink: 0; }
.exercise-card-header h4 { font-family: var(--font-title); margin: 0; font-size: 1.15rem; }
.difficulty-badge { margin-left: auto; padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 700; letter-spacing: 1px; }
.easy   { background: rgba(16,185,129,0.2);  color: #6ee7b7; }
.medium { background: rgba(245,158,11,0.2);  color: #fde68a; }
.hard   { background: rgba(239,68,68,0.2);   color: #fca5a5; }
.exercise-card-body { padding: 24px; }
.exercise-context { background: var(--surface2); border-radius: 10px; padding: 16px; margin-bottom: 20px; font-size: .92rem; }
.exercise-question { font-size: 1rem; font-weight: 600; color: var(--primary); margin-bottom: 16px; padding: 12px 16px; background: rgba(37,99,168,0.07); border-left: 4px solid var(--primary-light); border-radius: 0 8px 8px 0; }
.option-list { list-style: none; padding: 0; margin: 0 0 16px; }
.option-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; margin-bottom: 8px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: border-color var(--transition), background var(--transition); font-size: .92rem; }
.option-item:hover    { border-color: var(--primary-light); background: rgba(37,99,168,0.04); }
.option-item.selected { border-color: var(--primary-light); background: rgba(37,99,168,0.08); }
.option-item.correct  { border-color: var(--success); background: #d1fae5; }
.option-item.incorrect{ border-color: var(--danger);  background: #fee2e2; }
.option-letter { width: 28px; height: 28px; border: 2px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-weight: 700; font-size: .82rem; flex-shrink: 0; transition: all var(--transition); }
.option-item.selected  .option-letter { background: var(--primary-light); border-color: var(--primary-light); color: #fff; }
.option-item.correct   .option-letter { background: var(--success); border-color: var(--success); color: #fff; }
.option-item.incorrect .option-letter { background: var(--danger);  border-color: var(--danger);  color: #fff; }
.option-text code { background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 4px; font-size: .82rem; }
.exercise-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-check-ex { background: var(--primary); color: #fff; border: none; padding: 10px 22px; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: .9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background var(--transition); }
.btn-check-ex:hover { background: var(--primary-light); }
.btn-show-sol { background: transparent; color: var(--primary-light); border: 2px solid var(--primary-light); padding: 10px 22px; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: .9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all var(--transition); }
.btn-show-sol:hover { background: var(--primary-light); color: #fff; }
.solution-panel { display: none; margin-top: 20px; border-top: 2px dashed var(--border); padding-top: 20px; }
.solution-panel.visible { display: block; animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.solution-explanation { background: #d1fae5; border: 1px solid rgba(16,185,129,0.3); border-radius: 10px; padding: 16px; margin-bottom: 16px; font-size: .9rem; line-height: 1.7; }
.solution-explanation p, .solution-explanation ul { margin-bottom: 8px; }
.solution-explanation ul { padding-left: 18px; }
.solution-code-title { font-family: var(--font-title); font-size: .82rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
.mini-crc { background: var(--surface); border: 2px solid var(--primary); border-radius: 8px; overflow: hidden; font-size: .82rem; height: 100%; }
.mini-crc-name { background: var(--primary); color: #fff; padding: 6px 10px; font-family: var(--font-title); font-weight: 700; font-size: .85rem; }
.mini-crc ul { padding: 8px 8px 8px 22px; margin: 0; line-height: 1.7; color: var(--text-muted); }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.bottom-dots { display: flex; gap: 6px; align-items: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; transition: all var(--transition); }
.dot.active { background: var(--primary); transform: scale(1.4); }
.dot.exercises-dot { background: var(--accent-warm); }
.dot.exercises-dot.active { background: var(--accent-warm); transform: scale(1.4); }
.btn-exercises { background: linear-gradient(135deg, var(--accent-warm), #e67e22); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-family: var(--font-body); font-weight: 600; font-size: .9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: opacity var(--transition); }
.btn-exercises:hover { opacity: .9; }
.btn-exercises.active-mode { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
.keyboard-hint { position: fixed; bottom: 60px; right: 16px; background: rgba(26,58,92,0.85); color: rgba(255,255,255,0.7); padding: 6px 12px; border-radius: 20px; font-size: .72rem; font-family: var(--font-code); pointer-events: none; }

@media (max-width: 768px) {
  .concept-box { grid-template-columns: 1fr; }
  .poly-flow { flex-direction: column; align-items: center; }
  .slide-title { font-size: 1.5rem; }
  .cover-title { font-size: 2.8rem; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <span class="grasp-badge">GRASP</span>
    <span>Polymorphism — Patrón de Polimorfismo</span>
  </div>
  <div class="topbar-nav">
    <button id="btn-prev" class="nav-btn" onclick="prevSlide()"><i class="fa-solid fa-chevron-left"></i> Anterior</button>
    <span class="slide-counter" id="slide-counter">1 / 9</span>
    <button id="btn-next" class="nav-btn" onclick="nextSlide()">Siguiente <i class="fa-solid fa-chevron-right"></i></button>
  </div>
</header>

<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:11%"></div></div>

<div class="slides-wrapper">
  <div id="slides-container" style="width:100%"></div>
</div>

<section id="exercises-section" class="exercises-wrapper">
  <div class="container-xl">
    <div class="ex-header">
      <div class="slide-label">Práctica</div>
      <h2><i class="fa-solid fa-dumbbell me-2 text-warning"></i>Ejercicios — GRASP Polymorphism</h2>
      <p class="text-muted">Identificá cuándo aplicar el patrón y refactorizá el código. Podés resolver en Rider antes de verificar.</p>
    </div>
    <div id="exercises-container"></div>
  </div>
</section>

<nav class="bottom-nav">
  <div class="bottom-dots"></div>
  <button class="btn-exercises" onclick="toggleMode()"><i class="fa-solid fa-dumbbell"></i> Ejercicios</button>
</nav>

<div class="keyboard-hint">← → para navegar</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<script>
/* ================================================================
   DATOS — SLIDES
   ================================================================ */
const SLIDES = [
  {
    id: 1, type: "cover",

/* ================================================================
   MOTOR DE SLIDES
   ================================================================ */
let currentSlide = 0;
let mode = "slides";

function renderSlide(data) {
  if (data.type === "cover") {
    return `
      <div class="slide-cover">
        <div class="cover-badge animate__animated animate__fadeInDown">${data.badge}</div>
        <div class="cover-icon animate__animated animate__bounceIn animate__delay-1s"><i class="${data.icon}"></i></div>
        <div class="cover-title animate__animated animate__fadeInUp">${data.title}</div>
        <div class="cover-subtitle animate__animated animate__fadeIn animate__delay-1s">${data.subtitle}</div>
        <div class="cover-note animate__animated animate__fadeIn animate__delay-2s">
          <i class="fa-solid fa-book me-2"></i>${data.note}
        </div>
      </div>`;
  }
  return `
    <div class="container-xl py-2">
      <div class="slide-label animate__animated animate__fadeInLeft">${data.label}</div>
      <div class="slide-title animate__animated animate__fadeInLeft">${data.title}</div>
      <div class="animate__animated animate__fadeIn animate__delay-1s">${data.content}</div>
    </div>`;
}

function buildSlides() {
  const c = document.getElementById("slides-container");
  c.innerHTML = "";
  SLIDES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = `slide${i === 0 ? " active" : ""}`;
    div.id = `slide-${i}`;
    div.innerHTML = renderSlide(s);
    c.appendChild(div);
  });
}

function buildDots() {
  const wrap = document.querySelector(".bottom-dots");
  wrap.innerHTML = "";
  SLIDES.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = `dot${i === 0 ? " active" : ""}`;
    d.title = `Diapositiva ${i + 1}`;
    d.onclick = () => goToSlide(i);
    wrap.appendChild(d);
  });
  const ex = document.createElement("div");
  ex.className = "dot exercises-dot";
  ex.title = "Ejercicios";
  ex.onclick = () => showExercises();
  wrap.appendChild(ex);
}

function updateUI() {
  if (mode !== "slides") return;
  document.querySelectorAll(".slide").forEach((s, i) => s.classList.toggle("active", i === currentSlide));
  document.querySelectorAll(".dot:not(.exercises-dot)").forEach((d, i) => d.classList.toggle("active", i === currentSlide));
  document.querySelector(".dot.exercises-dot")?.classList.remove("active");
  document.getElementById("btn-prev").disabled = currentSlide === 0;
  document.getElementById("btn-next").disabled = currentSlide === SLIDES.length - 1;
  document.getElementById("slide-counter").textContent = `${currentSlide + 1} / ${SLIDES.length}`;
  document.querySelector(".progress-bar-fill").style.width = `${((currentSlide + 1) / SLIDES.length) * 100}%`;
}

function goToSlide(n) {
  if (mode === "exercises") showSlides();
  currentSlide = Math.max(0, Math.min(n, SLIDES.length - 1));
  updateUI();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function prevSlide() { if (currentSlide > 0) goToSlide(currentSlide - 1); }
function nextSlide() { if (currentSlide < SLIDES.length - 1) goToSlide(currentSlide + 1); }

/* ================================================================
   MOTOR DE EJERCICIOS
   ================================================================ */
function showExercises() {
  mode = "exercises";
  document.getElementById("slides-container").style.display = "none";
  document.getElementById("exercises-section").classList.add("active");
  const btn = document.querySelector(".btn-exercises");
  btn.innerHTML = '<i class="fa-solid fa-chalkboard-user"></i> Ver Presentación';
  btn.classList.add("active-mode");
  document.getElementById("btn-prev").disabled = true;
  document.getElementById("btn-next").disabled = true;
  document.querySelector(".dot.exercises-dot")?.classList.add("active");
  document.querySelectorAll(".dot:not(.exercises-dot)").forEach(d => d.classList.remove("active"));
  document.querySelector(".progress-bar-fill").style.width = "100%";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showSlides() {
  mode = "slides";
  document.getElementById("slides-container").style.display = "";
  document.getElementById("exercises-section").classList.remove("active");
  const btn = document.querySelector(".btn-exercises");
  btn.innerHTML = '<i class="fa-solid fa-dumbbell"></i> Ejercicios';
  btn.classList.remove("active-mode");
  updateUI();
}

function toggleMode() {
  mode === "slides" ? showExercises() : showSlides();
}

function buildExercises() {
  const c = document.getElementById("exercises-container");
  c.innerHTML = "";
  EXERCISES.forEach(ex => {
    const div = document.createElement("div");
    div.className = "exercise-card";
    div.id = `ex-${ex.id}`;
    div.innerHTML = `
      <div class="exercise-card-header">
        <div class="ex-number">${ex.id}</div>
        <i class="${ex.icon}"></i>
        <h4>${ex.title}</h4>
        <span class="difficulty-badge ${ex.difficultyClass}">${ex.difficulty}</span>
      </div>
      <div class="exercise-card-body">
        <div class="exercise-context">${ex.context}</div>
        <div class="exercise-question">${ex.question}</div>
        <ul class="option-list" id="opts-${ex.id}">
          ${ex.options.map(o => `
            <li class="option-item" data-ex="${ex.id}" data-opt="${o.id}" onclick="selectOption(${ex.id},'${o.id}')">
              <div class="option-letter">${o.id.toUpperCase()}</div>
              <div class="option-text">${o.text}</div>
            </li>`).join("")}
        </ul>
        <div class="exercise-actions">
          <button class="btn-check-ex" onclick="checkAnswer(${ex.id})">
            <i class="fa-solid fa-check"></i> Verificar
          </button>
          <button class="btn-show-sol" onclick="toggleSolution(${ex.id})">
            <i class="fa-solid fa-eye"></i> Ver Solución
          </button>
        </div>
        <div class="solution-panel" id="sol-${ex.id}">
          <div class="solution-explanation">${ex.explanation}</div>
          <div class="solution-code-title"><i class="fa-solid fa-code me-2"></i>Implementación en C#</div>
          <pre><code>${ex.code}</code></pre>
        </div>
      </div>`;
    c.appendChild(div);
  });
}

const selectedOptions = {};

function selectOption(exId, optId) {
  if (document.querySelector(`#opts-${exId} .correct, #opts-${exId} .incorrect`)) return;
  selectedOptions[exId] = optId;
  document.querySelectorAll(`#opts-${exId} .option-item`).forEach(el => {
    el.classList.toggle("selected", el.dataset.opt === optId);
  });
}

function checkAnswer(exId) {
  const ex = EXERCISES.find(e => e.id === exId);
  const selected = selectedOptions[exId];
  if (!selected) {
    Swal.fire({ title: "Seleccioná una opción", text: "Hacé click en una de las respuestas antes de verificar.", icon: "warning", confirmButtonColor: "#1a3a5c", confirmButtonText: "Entendido" });
    return;
  }
  const items = document.querySelectorAll(`#opts-${exId} .option-item`);
  items.forEach(item => {
    if (item.dataset.opt === ex.correct) item.classList.add("correct");
    else if (item.dataset.opt === selected && selected !== ex.correct) item.classList.add("incorrect");
  });
  if (selected === ex.correct) {
    Swal.fire({ title: "¡Correcto! 🎉", html: "Aplicaste Polymorphism correctamente.<br>Revisá la solución completa abajo.", icon: "success", confirmButtonColor: "#10b981", confirmButtonText: "Ver explicación" })
      .then(() => document.getElementById(`sol-${exId}`).classList.add("visible"));
  } else {
    Swal.fire({ title: "No exactamente…", html: "Pensá: <strong>¿el código pregunta por el tipo con un if o switch?</strong> Ese es el síntoma que Polymorphism resuelve.", icon: "error", confirmButtonColor: "#1a3a5c", confirmButtonText: "Intentar de nuevo", showDenyButton: true, denyButtonText: "Ver solución", denyButtonColor: "#64748b" })
      .then(result => {
        if (result.isDenied) {
          document.getElementById(`sol-${exId}`).classList.add("visible");
        } else {
          items.forEach(i => i.classList.remove("selected", "correct", "incorrect"));
          delete selectedOptions[exId];
        }
      });
  }
}

function toggleSolution(exId) {
  document.getElementById(`sol-${exId}`).classList.toggle("visible");
}

/* ================================================================
   TECLADO
   ================================================================ */
document.addEventListener("keydown", e => {
  if (mode !== "slides") return;
  if (["ArrowRight", "ArrowDown", " "].includes(e.key)) { e.preventDefault(); nextSlide(); }
  if (["ArrowLeft", "ArrowUp"].includes(e.key))         { e.preventDefault(); prevSlide(); }
});

/* ================================================================
   INIT
   ================================================================ */
document.addEventListener("DOMContentLoaded", () => {
  buildSlides();
  buildDots();
  buildExercises();
  updateUI();
});
</script>
