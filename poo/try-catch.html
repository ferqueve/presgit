<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>try/catch en C# — Manejo de Excepciones</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<!-- Animate.css -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<!-- SweetAlert2 -->
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #0a0e1a;
    --surface:   #111827;
    --panel:     #1a2236;
    --border:    #1e3a5f;
    --accent:    #00d4ff;
    --accent2:   #7c3aed;
    --accent3:   #10b981;
    --warn:      #f59e0b;
    --danger:    #ef4444;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --code-bg:   #0d1117;
    --success:   #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
    z-index: 9999;
    box-shadow: 0 0 12px var(--accent);
  }

  /* ─── SLIDE CONTAINER ─── */
  #slides-wrapper {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 60px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease;
  }

  .slide.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── GRID BACKGROUND ─── */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ─── SLIDE HEADER ─── */
  .slide-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1.hero {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 5vw, 4rem);
    line-height: 1.1;
    color: #fff;
    text-align: center;
  }

  h1.hero span { color: var(--accent); }

  h2.slide-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    color: #fff;
    margin-bottom: 4px;
  }

  h2.slide-title .kw { color: var(--accent); }
  h2.slide-title .kw2 { color: var(--accent2); }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ─── CARDS ─── */
  .card-glass {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 28px;
    position: relative;
    overflow: hidden;
  }

  .card-glass::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  /* ─── CODE BLOCK ─── */
  pre.code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    line-height: 1.7;
    color: #c9d1d9;
    overflow-x: auto;
    position: relative;
    text-align: left;
    width: 100%;
  }

  pre.code-block .kw   { color: #ff7b72; }
  pre.code-block .type { color: #79c0ff; }
  pre.code-block .str  { color: #a5d6ff; }
  pre.code-block .cmt  { color: #8b949e; font-style: italic; }
  pre.code-block .fn   { color: #d2a8ff; }
  pre.code-block .var  { color: #ffa657; }
  pre.code-block .num  { color: #79c0ff; }

  /* ─── BADGE ─── */
  .badge-accent {
    background: rgba(0,212,255,.15);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,.3);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    padding: 3px 10px;
  }

  .badge-warn {
    background: rgba(245,158,11,.15);
    color: var(--warn);
    border: 1px solid rgba(245,158,11,.3);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    padding: 3px 10px;
  }

  .badge-danger {
    background: rgba(239,68,68,.15);
    color: var(--danger);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    padding: 3px 10px;
  }

  /* ─── LIST ─── */
  ul.feature-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  ul.feature-list li {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 1rem;
    line-height: 1.5;
  }

  ul.feature-list li .icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    font-size: .75rem;
  }

  /* ─── FLOW DIAGRAM ─── */
  .flow-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .flow-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    text-align: center;
    min-width: 110px;
  }

  .flow-box.try-box   { border-color: var(--accent);  color: var(--accent);  }
  .flow-box.ok-box    { border-color: var(--accent3); color: var(--accent3); }
  .flow-box.err-box   { border-color: var(--danger);  color: var(--danger);  }
  .flow-box.catch-box { border-color: var(--warn);    color: var(--warn);    }
  .flow-box.clr-box   { border-color: var(--accent2); color: var(--accent2); }
  .flow-box.end-box   { border-color: var(--muted);   color: var(--text);    }

  .flow-arrow { color: var(--muted); font-size: 1.2rem; }

  /* ─── NAVIGATION ─── */
  #nav-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 22px;
    z-index: 999;
    box-shadow: 0 4px 30px rgba(0,0,0,.4);
  }

  #nav-bar button {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all .2s;
    font-size: .95rem;
  }

  #nav-bar button:hover { background: rgba(255,255,255,.06); color: #fff; }
  #nav-bar button:disabled { opacity: .3; cursor: default; }

  #slide-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: var(--accent);
    min-width: 60px;
    text-align: center;
  }

  /* ─── SLIDE-SPECIFIC: HERO ─── */
  .hero-glow {
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,.12) 0%, transparent 70%);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .7; }
    50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
  }

  /* ─── TERMINAL ─── */
  .terminal {
    background: #050810;
    border: 1px solid #1a2236;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    padding: 16px 20px;
    width: 100%;
    color: #c9d1d9;
    line-height: 1.8;
  }

  .terminal .prompt { color: var(--accent3); }
  .terminal .output { color: var(--muted); }
  .terminal .error  { color: var(--danger); }
  .terminal .ok     { color: var(--success); }

  /* ─── CODE RUNNER (Slide 10+) ─── */
  #runner-section {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  #exercise-tabs .nav-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    padding: 6px 12px;
    border-radius: 6px;
    color: var(--muted);
    border: 1px solid transparent;
    background: transparent;
    transition: all .2s;
  }

  #exercise-tabs .nav-link.active {
    background: rgba(0,212,255,.12);
    color: var(--accent);
    border-color: rgba(0,212,255,.3);
  }

  #exercise-tabs .nav-link.locked {
    opacity: .35;
    cursor: not-allowed;
  }

  #exercise-tabs .nav-link.solved {
    color: var(--success);
    border-color: rgba(34,197,94,.3);
    background: rgba(34,197,94,.08);
  }

  .ex-editor {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: .82rem;
    color: #c9d1d9;
    padding: 14px;
    min-height: 140px;
    resize: vertical;
    outline: none;
    width: 100%;
    line-height: 1.7;
  }

  .ex-editor:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,.15); }

  .run-btn {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    border: none;
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 9px 24px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: 1px;
  }

  .run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,255,.4); }

  #feedback-box {
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem;
    padding: 12px 16px;
    border-radius: 8px;
    min-height: 50px;
    border: 1px solid var(--border);
    background: var(--code-bg);
    color: var(--muted);
    display: none;
  }

  /* ─── COLUMNS ─── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    width: 100%;
  }

  /* ─── NOTA ─── */
  .note-box {
    background: rgba(245,158,11,.07);
    border: 1px solid rgba(245,158,11,.25);
    border-left: 3px solid var(--warn);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: .9rem;
    color: var(--text);
  }

  .note-box .note-title {
    color: var(--warn);
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  /* ─── SCROLLABLE CONTENT ─── */
  .slide-content {
    width: 100%;
    max-width: 900px;
    overflow-y: auto;
    max-height: calc(100vh - 160px);
    padding-right: 6px;
  }

  .slide-content::-webkit-scrollbar { width: 4px; }
  .slide-content::-webkit-scrollbar-track { background: transparent; }
  .slide-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ─── GLOW ACCENT LINE ─── */
  .accent-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin: 10px auto 20px;
  }

  /* ─── STEP BADGE ─── */
  .step-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: .8rem;
    flex-shrink: 0;
  }

  /* ─── ANIMATE HELPERS ─── */
  .delay-1 { animation-delay: .15s; }
  .delay-2 { animation-delay: .3s; }
  .delay-3 { animation-delay: .45s; }
  .delay-4 { animation-delay: .6s; }
  .delay-5 { animation-delay: .75s; }

  /* ─── EXCEPTION TYPE CARDS ─── */
  .exc-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .exc-icon {
    width: 38px; height: 38px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  @media (max-width: 768px) {
    .slide { padding: 24px 20px; }
    .two-col { grid-template-columns: 1fr; }
    h1.hero { font-size: 2rem; }
  }
</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="slides-wrapper"></div>

<!-- NAV -->
<div id="nav-bar">
  <button id="btn-prev" onclick="navigate(-1)" title="Anterior">
    <i class="fas fa-chevron-left"></i>
  </button>
  <span id="slide-counter">1 / 1</span>
  <button id="btn-next" onclick="navigate(1)" title="Siguiente">
    <i class="fas fa-chevron-right"></i>
  </button>
  <button onclick="showSlideMenu()" title="Diapositivas" style="margin-left:4px">
    <i class="fas fa-th-large"></i>
  </button>
  <button onclick="toggleFullscreen()" title="Pantalla completa">
    <i class="fas fa-expand"></i>
  </button>
</div>

<!-- Bootstrap + SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
/* ══════════════════════════════════════
   SLIDES DATA
══════════════════════════════════════ */
const slides = [

/* ── 0: HERO ── */
{
  title: 'Hero',
  render: () => `
    <div class="hero-glow"></div>
    <div class="text-center animate__animated animate__fadeInDown">
      <div class="slide-label">C# · Manejo de Excepciones</div>
      <h1 class="hero mt-2">Bloque <span>try</span> / <span style="color:var(--accent2)">catch</span></h1>
      <div class="accent-line"></div>
      <p class="subtitle">Detectar y controlar excepciones en tiempo de ejecución</p>
      <div class="d-flex justify-content-center gap-3 flex-wrap mt-3">
        <span class="badge-accent"><i class="fas fa-shield-halved me-1"></i> Excepciones CLR</span>
        <span class="badge-warn"><i class="fas fa-code me-1"></i> .NET 8</span>
        <span class="badge-danger"><i class="fas fa-terminal me-1"></i> Ejercicios dotnet</span>
      </div>
    </div>
    <div class="mt-5 animate__animated animate__fadeInUp delay-3">
      <div class="flow-wrap">
        <div class="flow-box try-box animate__animated animate__fadeInLeft delay-1">try { }</div>
        <span class="flow-arrow"><i class="fas fa-arrow-right"></i></span>
        <div class="flow-box catch-box animate__animated animate__fadeIn delay-2">catch(E1)</div>
        <span class="flow-arrow"><i class="fas fa-arrow-right"></i></span>
        <div class="flow-box catch-box animate__animated animate__fadeIn delay-3">catch(E2)</div>
        <span class="flow-arrow"><i class="fas fa-arrow-right"></i></span>
        <div class="flow-box clr-box animate__animated animate__fadeIn delay-4">CLR</div>
        <span class="flow-arrow"><i class="fas fa-arrow-right"></i></span>
        <div class="flow-box end-box animate__animated animate__fadeInRight delay-5">fin</div>
      </div>
    </div>
    <p class="text-center mt-4 animate__animated animate__fadeIn delay-5" style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.75rem">
      <i class="fas fa-keyboard me-2"></i>← → para navegar · F para pantalla completa
    </p>
  `
},

/* ── 1: ¿QUÉ ES UNA EXCEPCIÓN? ── */
{
  title: '¿Qué es una Excepción?',
  render: () => `
    <div class="slide-content">
      <div class="slide-label animate__animated animate__fadeIn">Concepto base</div>
      <h2 class="slide-title animate__animated animate__fadeInDown"><i class="fas fa-bolt me-2" style="color:var(--warn)"></i>¿Qué es una <span class="kw">Excepción</span>?</h2>
      <div class="accent-line" style="margin-left:0"></div>
      <div class="two-col">
        <div class="card-glass animate__animated animate__fadeInLeft">
          <p class="mb-2" style="font-size:.9rem;color:var(--muted);font-family:'JetBrains Mono',monospace">DEFINICIÓN</p>
          <p>Una <strong style="color:var(--accent)">excepción</strong> es un evento inesperado que interrumpe el flujo normal de ejecución de un programa.</p>
          <p class="mt-2">En .NET, toda excepción es un objeto que hereda de <code style="color:var(--warn)">System.Exception</code>.</p>
        </div>
        <div class="card-glass animate__animated animate__fadeInRight">
          <p class="mb-2" style="font-size:.9rem;color:var(--muted);font-family:'JetBrains Mono',monospace">SIN MANEJO</p>
          <pre class="code-block" style="font-size:.72rem">
<span class="cmt">// Esto detiene el programa:</span>
<span class="type">string</span> <span class="var">s</span> = <span class="kw">null</span>;
<span class="fn">Console</span>.<span class="fn">WriteLine</span>(<span class="var">s</span>.Length);
<span class="cmt">// ❌ NullReferenceException</span></pre>
        </div>
      </div>
      <div class="mt-3 animate__animated animate__fadeInUp delay-2">
        <ul class="feature-list">
          <li>
            <div class="icon" style="background:rgba(0,212,255,.15)"><i class="fas fa-circle-info" style="color:var(--accent)"></i></div>
            <div>Las excepciones ocurren en <strong>tiempo de ejecución</strong> (runtime), no en compilación.</div>
          </li>
          <li>
            <div class="icon" style="background:rgba(239,68,68,.15)"><i class="fas fa-triangle-exclamation" style="color:var(--danger)"></i></div>
            <div>Una excepción no controlada <strong style="color:var(--danger)">detiene la aplicación</strong>.</div>
          </li>
          <li>
            <div class="icon" style="background:rgba(34,197,94,.15)"><i class="fas fa-shield-halved" style="color:var(--success)"></i></div>
            <div>El bloque <code style="color:var(--accent)">try/catch</code> nos permite <strong>controlarlas</strong> elegantemente.</div>
          </li>
        </ul>
      </div>
      <div class="note-box mt-3 animate__animated animate__fadeIn delay-4">
        <div class="note-title"><i class="fas fa-lightbulb me-1"></i> NOTA CLR</div>
        El Common Language Runtime (CLR) de .NET detecta las excepciones y busca el manejador (<code>catch</code>) apropiado en la pila de llamadas.
      </div>
    </div>
  `
},

/* ── 2: SINTAXIS BÁSICA ── */
{
  title: 'Sintaxis try/catch',
  render: () => `
    <div class="slide-content">
      <div class="slide-label animate__animated animate__fadeIn">Sintaxis</div>
      <h2 class="slide-title animate__animated animate__fadeInDown">Estructura <span class="kw">try</span> / <span class="kw2">catch</span></h2>
      <div class="accent-line" style="margin-left:0"></div>
      <div class="two-col">
        <div class="animate__animated animate__fadeInLeft">
          <pre class="code-block">
<span class="kw">try</span>
{
    <span class="cmt">// Código que PUEDE lanzar</span>
    <span class="cmt">// una excepción</span>
    <span class="type">int</span> <span class="var">resultado</span> = <span class="num">10</span> / <span class="num">0</span>;
}
<span class="kw">catch</span> (<span class="type">DivideByZeroException</span> <span class="var">e</span>)
{
    <span class="cmt">// Controla ESTE tipo</span>
    <span class="fn">Console</span>.<span class="fn">WriteLine</span>(<span class="var">e</span>.Message);
}
<span class="kw">catch</span> (<span class="type">Exception</span> <span class="var">e</span>)
{
    <span class="cmt">// Captura cualquier excepción</span>
    <span class="fn">Console</span>.<span class="fn">WriteLine</span>(<span class="str">"Error: "</span> + <span class="var">e</span>.Message);
}</pre>
        </div>
        <div class="animate__animated animate__fadeInRight">
          <div class="card-glass mb-3">
            <div class="d-flex align-items-center gap-2 mb-2">
              <span class="step-num">1</span>
              <strong style="color:var(--accent)">Bloque try</strong>
            </div>

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let currentSlide = 0;
let currentEx = 0;
let solvedExercises = new Set();
let unlockedExercises = new Set([0]);

/* ══════════════════════════════════════
   SLIDE RENDER
══════════════════════════════════════ */
function buildSlides() {
  const wrapper = document.getElementById('slides-wrapper');
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.id = `slide-${i}`;
    div.innerHTML = s.render();
    wrapper.appendChild(div);
  });
}

function showSlide(idx) {
  const all = document.querySelectorAll('.slide');
  all.forEach(s => s.classList.remove('active'));
  document.getElementById(`slide-${idx}`).classList.add('active');

  const total = slides.length;
  document.getElementById('slide-counter').textContent = `${idx + 1} / ${total}`;
  document.getElementById('btn-prev').disabled = (idx === 0);
  document.getElementById('btn-next').disabled = (idx === total - 1);

  const pct = ((idx) / (total - 1)) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';

  if (slides[idx].isRunner) {
    buildRunnerUI();
  }
}

function navigate(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= slides.length) return;
  currentSlide = next;
  showSlide(currentSlide);
}

/* ══════════════════════════════════════
   CODE RUNNER
══════════════════════════════════════ */
function buildRunnerUI() {
  const tabs = document.getElementById('exercise-tabs');
  if (!tabs) return;
  tabs.innerHTML = '';
  exercises.forEach((ex, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    const a = document.createElement('a');
    a.className = 'nav-link' +
      (solvedExercises.has(i) ? ' solved' : '') +
      (!unlockedExercises.has(i) ? ' locked' : '') +
      (i === currentEx ? ' active' : '');
    a.textContent = solvedExercises.has(i) ? '✓ ' + ex.id : ex.id.toString().padStart(2,'0');
    a.title = ex.title;
    if (unlockedExercises.has(i)) {
      a.onclick = () => selectExercise(i);
    } else {
      a.onclick = () => Swal.fire({
        icon: 'info',
        title: '🔒 Bloqueado',
        text: `Completa el ejercicio ${i} primero.`,
        background: '#111827',
        color: '#e2e8f0',
        confirmButtonColor: '#00d4ff'
      });
    }
    li.appendChild(a);
    tabs.appendChild(li);
  });
  loadExercise(currentEx);
  updateProgress();
}

function selectExercise(i) {
  currentEx = i;
  buildRunnerUI();
}

function loadExercise(i) {
  const ex = exercises[i];
  const desc = document.getElementById('ex-description');
  const hint = document.getElementById('ex-hint');
  const editor = document.getElementById('ex-editor');
  const fb = document.getElementById('feedback-box');
  if (!desc || !editor) return;
  desc.innerHTML = `<strong style="color:var(--accent)">${ex.title}</strong><br>${ex.description}`;
  hint.innerHTML = '';
  editor.value = ex.template;
  fb.style.display = 'none';
}

function resetEditor() {
  document.getElementById('ex-editor').value = exercises[currentEx].template;
  document.getElementById('feedback-box').style.display = 'none';
}

function showHintSwal() {
  Swal.fire({
    icon: 'info',
    title: '<span style="color:#f59e0b">💡 Pista</span>',
    html: `<span style="font-family:'JetBrains Mono',monospace;font-size:.85rem;color:#c9d1d9">${exercises[currentEx].hint}</span>`,
    background: '#111827',
    color: '#e2e8f0',
    confirmButtonColor: '#00d4ff'
  });
}

function updateProgress() {
  const el = document.getElementById('ex-progress');
  if (el) el.textContent = `${solvedExercises.size} / ${exercises.length} resueltos`;
}

function runExercise() {
  const code = document.getElementById('ex-editor').value;
  const ex = exercises[currentEx];
  const fb = document.getElementById('feedback-box');

  const passed = ex.check(code);
  fb.style.display = 'block';

  if (passed) {
    fb.style.background = 'rgba(34,197,94,.08)';
    fb.style.borderColor = 'rgba(34,197,94,.3)';
    fb.style.color = '#22c55e';
    fb.innerHTML = `<i class="fas fa-circle-check me-2"></i><strong>¡Correcto!</strong> ${currentEx < exercises.length - 1 ? 'Siguiente ejercicio desbloqueado.' : '¡Completaste todos los ejercicios!'}`;

    if (!solvedExercises.has(currentEx)) {
      solvedExercises.add(currentEx);
      if (currentEx + 1 < exercises.length) {
        unlockedExercises.add(currentEx + 1);
      }
    }

    Swal.fire({
      icon: 'success',
      title: '✅ ¡Ejercicio correcto!',
      html: currentEx < exercises.length - 1
        ? `<span style="font-size:1rem">Ejercicio <strong>${currentEx + 2}</strong> desbloqueado.</span>`
        : `<span style="font-size:1rem">🎉 ¡Completaste los <strong>10 ejercicios</strong>!</span>`,
      background: '#111827',
      color: '#e2e8f0',
      confirmButtonColor: '#22c55e',
      timer: 2800,
      timerProgressBar: true,
      showConfirmButton: true,
      confirmButtonText: currentEx < exercises.length - 1 ? 'Siguiente →' : '🎓 Finalizar'
    }).then(() => {
      if (currentEx + 1 < exercises.length) {
        currentEx++;
        buildRunnerUI();
      }
    });
  } else {
    fb.style.background = 'rgba(239,68,68,.08)';
    fb.style.borderColor = 'rgba(239,68,68,.3)';
    fb.style.color = '#ef4444';
    fb.innerHTML = `<i class="fas fa-circle-xmark me-2"></i><strong>Incorrecto.</strong> Revisa tu código. Usa el botón <strong>Pista</strong> si necesitas ayuda.`;
  }

  buildRunnerUI();
}

/* ══════════════════════════════════════
   SLIDE MENU
══════════════════════════════════════ */
function showSlideMenu() {
  const items = slides.map((s, i) =>
    `<li style="padding:8px 12px;cursor:pointer;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:${i===currentSlide?'var(--accent)':'#c9d1d9'};background:${i===currentSlide?'rgba(0,212,255,.1)':'transparent'}"
     onclick="Swal.close(); currentSlide=${i}; showSlide(${i})">
       <span style="color:var(--muted);margin-right:8px">${String(i+1).padStart(2,'0')}</span>${s.title}
     </li>`
  ).join('');

  Swal.fire({
    title: '<span style="color:#00d4ff;font-size:1rem;letter-spacing:2px">DIAPOSITIVAS</span>',
    html: `<ul style="list-style:none;padding:0;margin:0;max-height:320px;overflow-y:auto">${items}</ul>`,
    background: '#111827',
    color: '#e2e8f0',
    showConfirmButton: false,
    showCloseButton: true,
    width: 420
  });
}

/* ══════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════ */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* ══════════════════════════════════════
   KEYBOARD
══════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Don't navigate if runner editor focused
  if (document.activeElement && document.activeElement.id === 'ex-editor') return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   navigate(-1);
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Enter' && slides[currentSlide]?.isRunner) runExercise();
});

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
buildSlides();
showSlide(0);
</script>
